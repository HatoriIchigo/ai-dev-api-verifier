openapi: 3.0.3
# 4xx レスポンスを欠落させ、redocly(operation-4xx-response) のみを失敗させるケース。
# operations / frontmatter は成功する。
info:
  title: Missing 4xx API
  version: 1.0.0
servers:
  - url: https://api.example.org
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      x-internal: false
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

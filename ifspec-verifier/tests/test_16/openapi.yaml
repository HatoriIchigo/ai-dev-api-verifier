#
# filename: openapi.yaml
# description: backendのIF仕様書
# created_by:
# created_at: 2026-06-16
# status: approved
#
# created_by の値が空（キーはあるが値なし）→ 欠落扱いでフロントマターチェックが失敗するケース。
# redocly / operations は成功する。

openapi: 3.0.3
info:
  title: Empty Frontmatter Value API
  version: 1.0.0
servers:
  - url: https://api.example.org
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      x-internal: false
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

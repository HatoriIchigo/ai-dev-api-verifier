openapi: 3.0.3
# x-internal: true だが行末コメントが無い → operations チェックが失敗するケース。
info:
  title: Internal Without Comment API
  version: 1.0.0
servers:
  - url: https://api.example.org
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      x-internal: true
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

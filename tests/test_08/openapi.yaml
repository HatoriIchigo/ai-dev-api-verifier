#
# filename: openapi.yaml
# description: backendのIF仕様書
# created_by: tester
# created_at: 2026-06-16
# status: approved
#

openapi: 3.0.3
# x-internal: true + 「外部接続:」で始まる行末コメント有り → 検証成功するケース。
# 値とコメントの間に余分な空白があっても許容されることを確認する。
info:
  title: Internal With Comment API
  version: 1.0.0
servers:
  - url: https://api.example.org
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      x-internal: true    #    外部接続: DB/Cognito
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

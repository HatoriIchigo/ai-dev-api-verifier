openapi: 3.0.3
# server URL に example.com を使い、redocly(no-server-example.com) のみを失敗させるケース。
# operations / frontmatter は成功する。
info:
  title: Example.com Server API
  version: 1.0.0
servers:
  - url: https://api.example.com
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      x-internal: false
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
